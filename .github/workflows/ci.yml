name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

jobs:
  package-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5

      - run: uv sync
      - run: uv run python -c "import quantgist_mcp"
      - run: uv build

  publish:
    # Publishes to PyPI via the trusted publisher bound to this workflow
    # (QuantGist-Technologies/QuantGist_MCP · ci.yml). Runs only on v* tags.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-registry:
    # Publishes server.json to the official MCP Registry via GitHub OIDC.
    # OIDC from this repo authenticates the io.github.QuantGist-Technologies/* namespace.
    # Runs after PyPI publish so the registry can validate the mcp-name marker in the
    # freshly-published package README.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write  # required for OIDC login to the MCP registry

    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar -xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Wait for PyPI to expose the new release
        run: sleep 45

      - name: Validate server.json
        run: mcp-publisher validate server.json

      - name: Login (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: mcp-publisher publish server.json
