# QuantGist MCP — hosted streamable-HTTP server.
#
# Coolify deploys this compose file using the PRE-BUILT image pushed by GitHub
# Actions (see .github/workflows/docker-build.yml). Do NOT add a `build:` block —
# Coolify must pull the image, not build it.
#
# For local self-hosting from source instead, see DEPLOY.md (`docker build` /
# `docker run`) — you don't need this file for that.
services:
  quantgist-mcp:
    image: ghcr.io/quantgist-technologies/quantgist-mcp:latest
    # Always re-pull :latest on deploy so a Coolify webhook redeploy picks up the
    # freshly-pushed image (otherwise compose reuses the cached :latest digest).
    pull_policy: always
    restart: unless-stopped
    environment:
      # MULTI-TENANT: no server-side key. Every caller must send their own QuantGist
      # key in the X-API-Key header, billed to their own quota. (To run single-tenant
      # instead, add QUANTGIST_API_KEY here and lock the endpoint behind access control.)
      - PORT=8000
      - HOST=0.0.0.0
    # No Coolify domain is set for this app: routing to api.quantgist.com/mcp is handled
    # by the priority-2000 Traefik file-router (deploy/traefik-mcp.yml), which targets this
    # service's network alias `quantgist-mcp:8000`. See DEPLOY.md § "Current live deployment".
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
